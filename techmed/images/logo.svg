<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 64" role="img" aria-label="Tech Med">
  <defs>
    <linearGradient id="tmGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0F6E5E"/>
      <stop offset="1" stop-color="#12897A"/>
    </linearGradient>
  </defs>
  <!-- Mark: rounded square with cross + pulse -->
  <rect x="4" y="10" width="44" height="44" rx="13" fill="url(#tmGrad)"/>
  <!-- medical cross -->
  <rect x="23" y="18" width="6" height="28" rx="3" fill="#FFFFFF" opacity="0.92"/>
  <rect x="12" y="29" width="28" height="6" rx="3" fill="#FFFFFF" opacity="0.92"/>
  <!-- pulse line across the mark -->
  <path d="M9 40 h7 l3 -8 l4 14 l3 -9 h9" fill="none" stroke="#FF6B57" stroke-width="2.4"
        stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Wordmark -->
  <text x="60" y="34" font-family="Fraunces, Georgia, serif" font-size="24" font-weight="600" fill="#16241F">Tech</text>
  <text x="118" y="34" font-family="Fraunces, Georgia, serif" font-size="24" font-weight="600" fill="#0F6E5E">Med</text>
  <text x="60" y="50" font-family="Inter, Arial, sans-serif" font-size="9.5" letter-spacing="2.5" fill="#5B6B64">HEALTH COMPANION</text>
</svg>
